services:
  postgres:
    image: postgres:16-alpine
    container_name: aqar_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aqar1234
      POSTGRES_DB: aqar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqar_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    command: npm run start:dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aqar_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aqar.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
