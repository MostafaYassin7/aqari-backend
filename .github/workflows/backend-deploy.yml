name: Backend — Deploy to GCP via Dokploy

on:
  push:
    branches:
      - main  # change to develop when you create that branch

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test

  deploy:
    name: Trigger Dokploy Deployment
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Trigger Dokploy deployment
        run: |
          curl -X GET "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            --fail --silent --show-error

      - name: Deployment triggered
        run: echo "✅ Dokploy deployment triggered"